{% extends "base.html" %}

{% block content %}
    <h2>Ajouter un changement d'eau</h2>
    <form method="POST">
        <input type="date" name="date" value="{{ datetime.now().strftime('%Y-%m-%d') }}" required>
        <input type="number" name="volume_changed" placeholder="Volume changé (L)" step="0.1" required>
        <textarea name="notes" placeholder="Notes"></textarea>
        <button type="submit" class="btn">Enregistrer</button>
    </form>
{% endblock %}
